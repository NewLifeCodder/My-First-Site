<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash T. | Tech & Math Hub</title>
    <link rel="icon" href="https://fav.farm/⚡" />
    <style>
        /* CSS Variables for Mode Toggle */
        :root {
            --bg-color: #05050a;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #00d2ff;
            --grid-line: rgba(0, 210, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.02);
            --status-green: #00ff88;
            --shadow-color: rgba(0, 210, 255, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --text-primary: #1a1a2e;
            --text-secondary: #475569;
            --accent-color: #0077ff;
            --grid-line: rgba(0, 119, 255, 0.12);
            --card-bg: rgba(0, 0, 0, 0.04);
            --status-green: #00ad5d;
            --shadow-color: rgba(0, 119, 255, 0.2);
        }

        /* Base Body & Background Animation */
        @keyframes scan {
            from { background-position: 0px 0px, 0px 0px, center; }
            to { background-position: 40px 40px, 40px 40px, center; }
        }

        body {
    /* ... other styles ... */
    background-image: 
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        radial-gradient(at 0% 0%, hsla(197, 100%, 49%, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(280, 100%, 50%, 0.1) 0px, transparent 50%);
    
    /* Match the sizes specifically to the layers */
    background-size: 40px 40px, 40px 40px, cover, cover;
    background-attachment: fixed; /* Keeps the neon glow from moving when scrolling */
    animation: scan 20s linear infinite; /* Slowed down to 20s for a smoother feel */
}

        /* Theme Toggle Button */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'SF Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 100;
        }

        .theme-switch:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* Profile Section */
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-image-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            object-fit: cover;
            background: #0a0a12;
            box-shadow: 0 0 30px var(--shadow-color);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 14px;
            height: 14px;
            background-color: var(--status-green);
            border-radius: 50%;
            border: 3px solid var(--bg-color);
            box-shadow: 0 0 15px var(--status-green);
            animation: pulse 2s infinite;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--shadow-color);
        }

        .username {
            color: var(--accent-color);
            font-size: 12px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        /* Interest Badges */
        .bio-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .bio-item {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .bio-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 320px;
            line-height: 1.6;
        }

        /* Links */
        .links-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--grid-line);
            padding: 16px;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text-primary);
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: scale(1.03);
            box-shadow: 0 0 20px var(--shadow-color);
            color: var(--accent-color);
        }

        /* Math Log Fact Container */
        .math-fact-container {
            margin-top: 50px;
            padding: 15px;
            width: 100%;
            max-width: 340px;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--grid-line);
        }

        .math-label {
            font-size: 10px;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: bold;
            opacity: 0.8;
        }

        .math-text {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()">SYSTEM_MODE: DARK</button>

    <div class="profile-container">
        <div class="profile-image-wrapper">
            <img src="https://github.com/NewLifeCodder.png" alt="Avinash T" class="profile-pic">
            <div class="status-dot"></div>
        </div>
        
        <h1>AVINASH T.</h1>
        <div class="username">@avinasht.connect</div>
        
        <div class="bio-grid">
            <div class="bio-item">Python</div>
            <div class="bio-item">C++</div>
            <div class="bio-item">Math (∫)</div>
        </div>
        
        <div class="bio-text">
            Executing digital workflows. Solving for precision. Connecting with the network. 
        </div>
    </div>

    <div class="links-container">
        <a href="https://instagram.com/avinasht.connect" target="_blank" class="card">INSTAGRAM</a>
        <a href="https://wa.me/919744721833" target="_blank" class="card">WHATSAPP</a>
        <a href="https://github.com/NewLifeCodder" target="_blank" class="card">GITHUB_PROFILE</a>
    </div>

    <div class="math-fact-container">
        <div class="math-label">[SYSTEM_LOG_MATH]</div>
        <div id="math-fact-text" class="math-text">Fetching data...</div>
    </div>

    <script>
        const mathFacts = [
            "A 'Jiffy' is 1/100th of a second.",
            "Nature follows Fibonacci: 1, 1, 2, 3, 5, 8...",
            "A 'googol' is 10 to the power of 100.",
            "Roman numerals have no symbol for zero.",
            "111,111,111^2 = 12,345,678,987,654,321.",
            "Euler's Identity: e^(iπ) + 1 = 0.",
            "The number Pi has no end and no repeating pattern."
        ];

        function getRandomFact() {
            const randomIndex = Math.floor(Math.random() * mathFacts.length);
            document.getElementById('math-fact-text').innerText = mathFacts[randomIndex];
        }

        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.querySelector('.theme-switch');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                body.removeAttribute('data-theme');
                btn.innerText = "SYSTEM_MODE: DARK";
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = "SYSTEM_MODE: LIGHT";
            }
        }

        window.onload = getRandomFact;
    </script>

</body>
</html>
