<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash T. | Tech & Math Hub</title>
    <link rel="icon" href="https://fav.farm/⚡" />
    <style>
        /* Base Design - Dark, Technical, Precise */
        body {
            font-family: 'Segoe UI', 'SF Mono', monospace;
            /* Dark Navy with a subtle Math Grid pattern */
            background-color: #0a0a12;
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* This creates the coordinate grid */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            z-index: 1;
        }

        .profile-image-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            object-fit: cover;
            background: #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 14px;
            height: 14px;
            background-color: #00ff88;
            border-radius: 50%;
            border: 3px solid #0a0a12;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse 2s infinite;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .username {
            color: #00d2ff;
            font-size: 13px;
            margin-top: 5px;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
        }

        /* Tech Interest Badges */
        .bio-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .bio-item {
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 15px;
            border-radius: 4px; /* Sharper corners for a tech look */
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: #00d2ff;
            text-transform: uppercase;
        }

        .bio-text {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
            max-width: 320px;
            line-height: 1.6;
        }

        /* Technical Link Cards */
        .links-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            text-align: left; /* Alignment change for a "list" feel */
            padding-left: 25px;
            font-size: 16px;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Tech Hover Effect */
        .card:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: #00d2ff;
            transform: translateX(10px); /* Slides right on hover */
            color: #00d2ff;
        }

        .card::before {
            content: '>';
            position: absolute;
            left: 10px;
            color: #00d2ff;
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Math Fact Footer */
        .math-fact-container {
            margin-top: 50px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            border-left: 2px solid #00d2ff;
            background: rgba(0, 210, 255, 0.02);
        }

        .math-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: #00d2ff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .math-text {
            font-size: 13px;
            color: #64748b;
            font-family: 'Courier New', monospace;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-image-wrapper">
            <img src="https://github.com/NewLifeCodder.png" alt="Avinash T" class="profile-pic">
            <div class="status-dot"></div>
        </div>
        
        <h1>AVINASH T.</h1>
        <div class="username">@avinasht.connect</div>
        
        <div class="bio-grid">
            <div class="bio-item">Tech</div>
            <div class="bio-item">Math (∫)</div>
            <div class="bio-item">Social</div>
        </div>
        
        <div class="bio-text">
            Executing digital workflows. Solving for precision. Connecting with the network. 
        </div>
    </div>

    <div class="links-container">
        <a href="https://instagram.com/avinasht.connect" target="_blank" class="card">INSTAGRAM</a>
        <a href="https://wa.me/919744721833" target="_blank" class="card">WHATSAPP</a>
        <a href="https://github.com/NewLifeCodder" target="_blank" class="card">GITHUB_PROFILE</a>
    </div>

    <div class="math-fact-container">
        <div class="math-label">[MATH_LOG_RANDOM]</div>
        <div id="math-fact-text" class="math-text">Initializing fact...</div>
    </div>

    <script>
        const mathFacts = [
            "A 'Jiffy' is 1/100th of a second.",
            "Nature follows Fibonacci: 1, 1, 2, 3, 5, 8...",
            "A 'googol' = 10^100.",
            "Roman numerals have no symbol for zero.",
            "111,111,111^2 = 12,345,678,987,654,321.",
            "The sum of angles in a triangle is always 180°.",
            "Euler's Identity: e^(iπ) + 1 = 0."
        ];

        function getRandomFact() {
            const randomIndex = Math.floor(Math.random() * mathFacts.length);
            document.getElementById('math-fact-text').innerText = mathFacts[randomIndex];
        }
        window.onload = getRandomFact;
    </script>

</body>
</html>
