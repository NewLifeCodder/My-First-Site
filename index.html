<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash T. | Tech & Math Hub</title>
    <link rel="icon" href="https://fav.farm/⚡" />
    <style>
        /* Base Design - Neon, Cybernetic, Technical */
        body {
            font-family: 'Segoe UI', 'SF Mono', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            
            /* NEON MESH GRADIENT BACKGROUND */
            background-color: #05050a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(197, 100%, 49%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(280, 100%, 50%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(190, 100%, 50%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(200, 100%, 50%, 0.1) 0px, transparent 50%);
            
            /* Subtler Math Grid for a cleaner Tech look */
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-image-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            object-fit: cover;
            background: #0a0a12;
            /* Neon Outer Glow */
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5), inset 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 14px;
            height: 14px;
            background-color: #00ff88;
            border-radius: 50%;
            border: 3px solid #05050a;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse 2s infinite;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
        }

        .username {
            color: #00d2ff;
            font-size: 12px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* Interest Badges */
        .bio-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .bio-item {
            background: rgba(0, 210, 255, 0.05);
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(0, 210, 255, 0.4);
            color: #00d2ff;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }

        .bio-text {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
            max-width: 320px;
            line-height: 1.6;
        }

        /* Neon Link Cards */
        .links-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 16px;
            border-radius: 4px;
            text-decoration: none;
            color: #ffffff;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* The Neon Pulse Hover */
        .card:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: #00d2ff;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            color: #00d2ff;
        }

        /* Math Fact Container - Technical Sidebar Style */
        .math-fact-container {
            margin-top: 50px;
            padding: 15px;
            width: 100%;
            max-width: 340px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .math-label {
            font-size: 10px;
            color: #00d2ff;
            margin-bottom: 8px;
            font-weight: bold;
            opacity: 0.7;
        }

        .math-text {
            font-size: 13px;
            color: #64748b;
            font-family: 'Courier New', monospace;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-image-wrapper">
            <img src="https://github.com/NewLifeCodder.png" alt="Avinash T" class="profile-pic">
            <div class="status-dot"></div>
        </div>
        
        <h1>AVINASH T.</h1>
        <div class="username">@avinasht.connect</div>
        
        <div class="bio-grid">
            <div class="bio-item">Tech</div>
            <div class="bio-item">Math (∫)</div>
            <div class="bio-item">Social</div>
        </div>
        
        <div class="bio-text">
            Executing digital workflows. Solving for precision. Connecting with the network. 
        </div>
    </div>

    <div class="links-container">
        <a href="https://instagram.com/avinasht.connect" target="_blank" class="card">INSTAGRAM</a>
        <a href="https://wa.me/919744721833" target="_blank" class="card">WHATSAPP</a>
        <a href="https://github.com/NewLifeCodder" target="_blank" class="card">GITHUB_PROFILE</a>
    </div>

    <div class="math-fact-container">
        <div class="math-label">[MATH_LOG_RANDOM]</div>
        <div id="math-fact-text" class="math-text">Initializing fact...</div>
    </div>

    <script>
        const mathFacts = [
            "A 'Jiffy' is 1/100th of a second.",
            "Nature follows Fibonacci: 1, 1, 2, 3, 5, 8...",
            "A 'googol' = 10^100.",
            "Roman numerals have no symbol for zero.",
            "111,111,111^2 = 12,345,678,987,654,321.",
            "The sum of angles in a triangle is always 180°.",
            "Euler's Identity: e^(iπ) + 1 = 0."
        ];

        function getRandomFact() {
            const randomIndex = Math.floor(Math.random() * mathFacts.length);
            document.getElementById('math-fact-text').innerText = mathFacts[randomIndex];
        }
        window.onload = getRandomFact;
    </script>

</body>
</html>
