<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash Connect</title>
    <link rel="icon" href="https://fav.farm/⚡" />
    <style>
        .math-fact-container {
            margin-top: 40px;
            padding: 15px;
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 0 0 15px 15px;
            text-align: center;
        }

        .math-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d2ff;
            margin-bottom: 8px;
        }

        .math-text {
            font-size: 13px;
            color: #bdc3c7;
            font-style: italic;
            line-height: 1.4;
        }
        .bio-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .bio-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bio-text {
            margin-top: 15px;
            font-size: 14px;
            color: #bdc3c7;
            line-height: 1.4;
        }
        
        /* Making the math symbol look cool */
        .bio-item span {
            color: #00d2ff;
        }
        .profile-image-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* The "Live" Status Dot */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background-color: #00ff88;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Base Design */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            max-width: 300px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .username {
            color: #00d2ff;
            font-size: 14px;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Bio Styling */
        .bio {
            margin-top: 15px;
            font-size: 15px;
            line-height: 1.5;
            color: #bdc3c7;
            font-weight: 400;
        }

        /* The Social Cards Container */
        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* The Individual Boxes */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Hover Animation */
        .card:hover {
            background: rgba(0, 210, 255, 0.15); /* Subtle blue glow background */
            transform: translateY(-5px) scale(1.02);
            border-color: #00d2ff;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            color: #00d2ff;
            letter-spacing: 1px; /* Text expands slightly when hovered */
        }
        @media (max-width: 480px) {
            .links-container {
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-image-wrapper">
            <img src="https://github.com/NewLifeCodder.png" alt="Avinash T" class="profile-pic">
            <div class="status-dot"></div>
        </div>
        
        <h1>Avinash T.</h1>
        <div class="username">@avinasht.connect</div>
        
        <div class="bio-grid">
            <div class="bio-item"><span>💻</span> Tech</div>
            <div class="bio-item"><span>&sum;</span> Math</div>
            <div class="bio-item"><span>&9786;</span> Friends</div>
        </div>
        
        <div class="bio-text">
            Building digital tools, solving for $x$, and always down for a hang. 
            Tap a box to connect!
        </div>
    </div>

    <div class="links-container">
        <a href="https://instagram.com/avinasht.connect" target="_blank" class="card">
            Instagram
        </a>

        <a href="https://wa.me/919744721833" target="_blank" class="card">
            WhatsApp
        </a>

        <a href="https://github.com/NewLifeCodder" target="_blank" class="card">
            GitHub
        </a>
    </div>
    <div class="math-fact-container">
        <div class="math-label">∑ Daily Math Fact</div>
        <div id="math-fact-text" class="math-text">Loading precision data...</div>
    </div>

</body>
    <script>
        const mathFacts = [
            "A 'Jiffy' is an actual unit of time: 1/100th of a second.",
            "The spiral shapes of sunflowers follow the Fibonacci sequence.",
            "A 'googol' is the number 1 followed by 100 zeros.",
            "Zero is the only number that can't be represented in Roman numerals.",
            "The word 'hundred' comes from the Old Norse word 'hundrath', which actually means 120.",
            "If you shuffle a deck of cards, that specific order has likely never existed before in history.",
            "Multiplying 111,111,111 by 111,111,111 gives 12,345,678,987,654,321."
        ];

        function getRandomFact() {
            const randomIndex = Math.floor(Math.random() * mathFacts.length);
            document.getElementById('math-fact-text').innerText = mathFacts[randomIndex];
        }

        // Run the function when the page loads
        window.onload = getRandomFact;
    </script>
</html>
